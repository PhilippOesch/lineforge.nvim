name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
          versioning-strategy: default
          package-name: lineforge.nvim
          bump-minor-pre-major: true
          bump-patch-for-minor-pre-major: true

  create-artifact:
    name: Create Release Artifact
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Neovim
        uses: muniftanjim/setup-neovim-action@v1
        with:
          tag: v0.10.0

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-deps-${{ hashFiles('Makefile') }}
          restore-keys: |
            ${{ runner.os }}-deps-

      - name: Generate documentation
        run: make gen_docs

      - name: Create plugin archive
        run: |
          mkdir -p dist
          zip -r dist/lineforge.nvim.zip \
            lua/ \
            doc/ \
            README.md \
            LICENSE \
            LICENSE-heirline.txt \
            -x "*/tests/*" -x "*/scripts/*"

      - name: Upload release artifact
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} dist/lineforge.nvim.zip --clobber
